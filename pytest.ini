[pytest]
# Async mode for pytest-asyncio
asyncio_mode = auto

# Main file for NiceGUI testing plugin
main_file = main.py

# Add NiceGUI user plugin and verbose output
addopts = -p nicegui.testing.user_plugin -v

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Silence NiceGUI's fire-and-forget refresh() artifact: Steps.record() calls
# render.refresh(), which schedules a background _fire task; the headless test
# loop tears down before it runs. Benign — not a missing await in our code.
filterwarnings =
    ignore:coroutine 'AwaitableResponse._fire' was never awaited:RuntimeWarning

# Markers for organizing tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    ui: marks tests as UI tests
    api: marks tests as API tests
    storage: marks tests as storage layer tests
    integration: marks tests as integration tests
    scim: marks tests as SCIM integration tests (deselect with '-m "not scim"')
